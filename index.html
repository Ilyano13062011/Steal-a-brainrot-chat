<!DOCTYPE html>
<html>
<head>
  <title>RotCord</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="sidebar">
    <h2>💬 RotCord</h2>
    <div class="channel" onclick="switchChannel('general')"># general</div>
    <div class="channel" onclick="switchChannel('trading')"># trading</div>
    <div class="channel" onclick="switchChannel('memes')"># memes</div>
  </div>

  <div class="chat">
    <div id="messages"></div>

    <div class="input">
      <input id="messageInput" placeholder="Message RotCord..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>

</body>
</html>
